<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Professional & Minimal</title>
    <!-- Google Fonts: Inter and Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --btn-hover-gradient: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            --background-gradient: radial-gradient(circle at 10% 20%, #f1f5f9 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #cbd5e1;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -5px rgba(0, 0, 0, 0.12), 0 10px 15px -5px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--background-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            color: var(--text-main);
            padding: 20px;
        }

        /* Ambient Blobs for Premium Visual Effect */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.45;
            animation: float 14s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 350px;
            height: 350px;
            background: #93c5fd;
            top: -50px;
            left: -50px;
        }
        .blob-2 {
            width: 450px;
            height: 450px;
            background: #c7d2fe;
            bottom: -100px;
            right: -100px;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 40px) scale(1.15); }
        }

        .app-card {
            width: 100%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e293b 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px 12px 44px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.7);
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-main);
            font-weight: 500;
        }

        .input-field::placeholder {
            color: #94a3b8;
        }

        .input-field:focus {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        /* Generate Button */
        .btn-generate {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.25);
            font-family: 'Poppins', sans-serif;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.4);
            background: var(--btn-hover-gradient);
        }

        .btn-generate:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(29, 78, 216, 0.25);
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Notifications Alert */
        .alert-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            empty-cells: show;
        }

        .alert {
            display: none;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.45;
            font-weight: 500;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: var(--shadow-sm);
        }

        @keyframes slideDown {
            0% { transform: translateY(-10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }

        .alert-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Preview Card */
        .preview-card {
            border-radius: 16px;
            border: 2px dashed #cbd5e1;
            background: rgba(255, 255, 255, 0.4);
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .preview-card.active {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-style: solid;
            box-shadow: var(--shadow-md);
        }

        .qr-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            gap: 12px;
            text-align: center;
        }

        .qr-placeholder svg {
            width: 56px;
            height: 56px;
            stroke-width: 1.2;
            color: #94a3b8;
            animation: pulsePlaceholder 2s ease-in-out infinite alternate;
        }

        @keyframes pulsePlaceholder {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .qr-placeholder span {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .qr-image-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .qr-image {
            max-width: 200px;
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            box-shadow: var(--shadow-sm);
        }

        .btn-download {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* Footer */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
            z-index: 1;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Ambient background design -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-card">
        <header>
            <h1>QR Code Generator</h1>
            <p>Generate high-quality QR codes instantly</p>
        </header>

        <!-- Form fields -->
        <div class="form-container">
            <!-- URL Input -->
            <div class="input-group">
                <label class="input-label" for="url-input">
                    <svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path></svg>
                    Enter URL
                </label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    </div>
                    <input type="text" id="url-input" class="input-field" placeholder="https://example.com" required autocomplete="off">
                </div>
            </div>

            <!-- Filename Input -->
            <div class="input-group">
                <label class="input-label" for="filename-input">
                    <svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                    File Name (Optional)
                </label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    </div>
                    <input type="text" id="filename-input" class="input-field" placeholder="qrcode">
                </div>
            </div>

            <!-- Generate Button -->
            <button id="btn-submit" class="btn-generate">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-text">Generate QR Code</span>
            </button>
        </div>

        <!-- Alert messages -->
        <div class="alert-area">
            <!-- Success Alert -->
            <div id="alert-success" class="alert alert-success">
                <svg class="alert-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="success-msg">QR code saved successfully.</span>
            </div>

            <!-- Error Alert -->
            <div id="alert-error" class="alert alert-error">
                <svg class="alert-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span id="error-msg">An error occurred.</span>
            </div>
        </div>

        <!-- QR Preview card -->
        <div id="preview-card" class="preview-card">
            <div id="qr-placeholder" class="qr-placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 15h.008v.008H15V15zm0 2.25h.008v.008H15v-.008zm0 2.25h.008v.008H15V19.5zm2.25-2.25h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V19.5zm-2.25-4.5h.008v.008H15v-.008zm2.25 0h.008v.008h-.008v-.008zm2.25 2.25h.008v.008H19.5V17.25zm0 2.25h.008v.008H19.5V19.5z"></path></svg>
                <span>Your generated QR code will appear here</span>
            </div>
            <div id="qr-image-container" class="qr-image-container">
                <img id="qr-image" class="qr-image" src="" alt="Generated QR Code">
                <button id="btn-download" class="btn-download">
                    <svg style="width:16px;height:16px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"></path></svg>
                    Download Copy
                </button>
            </div>
        </div>
    </div>

    <footer>
        Powered by Python & qrcode
    </footer>

    <script>
        const btnSubmit = document.getElementById('btn-submit');
        const btnSpinner = document.getElementById('btn-spinner');
        const btnText = document.getElementById('btn-text');
        const urlInput = document.getElementById('url-input');
        const filenameInput = document.getElementById('filename-input');
        
        const alertSuccess = document.getElementById('alert-success');
        const successMsg = document.getElementById('success-msg');
        const alertError = document.getElementById('alert-error');
        const errorMsg = document.getElementById('error-msg');
        
        const previewCard = document.getElementById('preview-card');
        const qrPlaceholder = document.getElementById('qr-placeholder');
        const qrImageContainer = document.getElementById('qr-image-container');
        const qrImage = document.getElementById('qr-image');
        const btnDownload = document.getElementById('btn-download');

        let generatedBase64 = null;
        let savedFilename = "qrcode.png";

        // Generate QR code submission
        btnSubmit.addEventListener('click', async () => {
            const urlVal = urlInput.value.trim();
            const filenameVal = filenameInput.value.trim();

            // Clear previous alerts
            hideAlerts();

            // Validation client side
            if (!urlVal) {
                showError("URL cannot be empty");
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlVal,
                        filename: filenameVal
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(result.message);
                    renderQR(result.image_data);
                    savedFilename = result.filename;
                } else {
                    showError(result.message || "An unexpected error occurred");
                }
            } catch (err) {
                showError("An unexpected error occurred: " + err.message);
            } finally {
                setLoading(false);
            }
        });

        // Trigger generation on enter key
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSubmit.click();
        });
        filenameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSubmit.click();
        });

        // Client side download
        btnDownload.addEventListener('click', () => {
            if (!generatedBase64) return;
            const link = document.createElement('a');
            link.href = generatedBase64;
            link.download = savedFilename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function setLoading(isLoading) {
            if (isLoading) {
                btnSpinner.style.display = 'block';
                btnText.textContent = 'Generating...';
                btnSubmit.disabled = true;
                urlInput.disabled = true;
                filenameInput.disabled = true;
            } else {
                btnSpinner.style.display = 'none';
                btnText.textContent = 'Generate QR Code';
                btnSubmit.disabled = false;
                urlInput.disabled = false;
                filenameInput.disabled = false;
            }
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            alertSuccess.style.display = 'flex';
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            alertError.style.display = 'flex';
        }

        function hideAlerts() {
            alertSuccess.style.display = 'none';
            alertError.style.display = 'none';
        }

        function renderQR(base64Data) {
            generatedBase64 = base64Data;
            qrImage.src = base64Data;
            qrPlaceholder.style.display = 'none';
            qrImageContainer.style.display = 'flex';
            previewCard.classList.add('active');
        }
    </script>
</body>
</html>
